name: Devin trigger

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  trigger-devin:
    if: github.event.label.name == 'devin'
    runs-on: ubuntu-latest
    steps:
      - name: Create Devin session
        id: devin
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPO_URL: ${{ github.event.repository.html_url }}
        run: |
          set -euo pipefail

          # Build the prompt that tells Devin to add test coverage and
          # produce an audit report with before/after metrics.
          PROMPT=$(cat <<'PROMPT_EOF'
          # ${ISSUE_TITLE}

          Repo: ${REPO_URL}
          Issue: ${ISSUE_URL}

          ${ISSUE_BODY}

          ## Instructions

          1. **Capture baseline coverage** — Run `python3 coverage_report.py` from
             the repo root and save the table output as the "before" snapshot.

          2. **Add tests** — Read the issue description and add the requested test
             coverage. Follow existing test conventions in each service
             (Java/JUnit for transaction-service, pytest for pii-service,
             Jest/Vitest for TypeScript services).

          3. **Create a PR** — Open a pull request with the new tests targeting
             the `main` branch.

          4. **Capture updated coverage** — Run `python3 coverage_report.py` again
             and save the table output as the "after" snapshot.

          5. **Generate an audit report** — Create a new file in `audit_reports/`
             named `coverage-audit-PR-<PR_NUMBER>.md` (replace `<PR_NUMBER>` with
             the actual PR number from step 3). The report must follow this
             format:

             ```
             # Coverage Audit Report

             **Report ID:** AUDIT-PR-<PR_NUMBER>
             **Generated:** <YYYY-MM-DD>
             **Type:** Coverage Improvement — PR #<PR_NUMBER>
             **Scope:** All ClearBank Core services
             **Issue:** <ISSUE_URL>

             ---

             ## Before

             <paste the "before" coverage table here>

             ## After

             <paste the "after" coverage table here>

             ## Changes

             - List each service whose coverage changed and by how much.

             ---

             *This is an automated audit report generated by ClearBank's coverage tooling.*
             ```

          6. **Commit the audit report** — Add the audit report file to the same
             PR branch and push.
          PROMPT_EOF
          )

          # Substitute env vars into the prompt
          PROMPT=$(echo "$PROMPT" | envsubst)

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg title  "$ISSUE_TITLE" \
            '{
              prompt: $prompt,
              title: $title
            }')

          RESPONSE=$(curl -sS --fail-with-body -X POST https://api.devin.ai/v1/sessions \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Devin API response: $RESPONSE"

          SESSION_URL=$(echo "$RESPONSE" | jq -r '.url // empty')
          SESSION_ID=$(echo "$RESPONSE"  | jq -r '.session_id // empty')

          if [ -z "$SESSION_URL" ] || [ -z "$SESSION_ID" ]; then
            echo "::error::Devin API did not return a session URL/ID. Response: $RESPONSE"
            exit 1
          fi

          {
            echo "session_url=$SESSION_URL"
            echo "session_id=$SESSION_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SESSION_URL: ${{ steps.devin.outputs.session_url }}
          SESSION_ID: ${{ steps.devin.outputs.session_id }}
        run: |
          set -euo pipefail
          BODY=$(printf '🤖 Devin session started: %s\n\nSession ID: `%s`' "$SESSION_URL" "$SESSION_ID")
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$BODY"
