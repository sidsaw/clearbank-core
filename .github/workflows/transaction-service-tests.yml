name: transaction-service tests

on:
  pull_request:
    paths:
      - 'transaction-service/**'
      - '.github/workflows/transaction-service-tests.yml'
  push:
    branches: [main]
    paths:
      - 'transaction-service/**'
      - '.github/workflows/transaction-service-tests.yml'

jobs:
  test:
    name: JUnit 5 tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transaction-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn -B test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: transaction-service/target/surefire-reports/
          if-no-files-found: ignore
